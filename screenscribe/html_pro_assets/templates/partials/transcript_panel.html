<section class="transcript-panel" id="transcriptPanel">
    <div class="transcript-panel-header">
        <h3 data-i18n="{transcript_heading_key}">{transcript_heading_text}</h3>
        <input type="text" id="subtitleSearch" class="search-box"
               data-i18n-attr="placeholder:{transcript_search_key}"
               placeholder="{transcript_search_text}">
    </div>
    <div id="subtitleList" class="subtitle-list transcript-list">
        {transcript_empty_state}
    </div>
</section>
