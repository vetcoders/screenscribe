# screenscribe - Default Keywords Configuration
#
# Keywords are user-editable HINTS for AI detection. They are
# always-on extra context, safe when empty, and never replace LLM analysis.
# Edit this file to teach screenscribe the words/phrases you and your team
# use to describe problem types. Multiple languages may share one file.
#
# Categories (match the semantic detection categories):
#   bug, change, ui, performance, accessibility, other

