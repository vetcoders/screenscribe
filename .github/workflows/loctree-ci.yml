# Loctree CI - Codebase Health Analysis
# Dead-code detection, circular imports, and health scoring for the Python tree.
#
# Built by Vetcoders

name: Loctree CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  HEALTH_THRESHOLD: 50

# Least-privilege GITHUB_TOKEN: read-only. Actions pinned to commit SHAs.
permissions:
  contents: read

jobs:
  loctree-analysis:
    name: Codebase Health Analysis (advisory)
    runs-on: ubuntu-latest
    # Advisory, not a merge gate: codebase-health signal only. The real gate is
    # the CI workflow; this never blocks a merge.
    continue-on-error: true

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: loctree-${{ runner.os }}
          restore-keys: |
            loctree-

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable branch, 2026-06 state
        with:
          toolchain: stable

      - name: Install loctree
        run: cargo install loctree --locked

      - name: Run Full Scan
        id: scan
        run: |
          echo "## 🌳 Loctree Codebase Health (Python)" >> $GITHUB_STEP_SUMMARY
          loct scan --force 2>/dev/null || true
          loct health >> $GITHUB_STEP_SUMMARY 2>&1 || true

          AGENT_JSON=$(find .loctree -name "agent.json" 2>/dev/null | head -1)
          if [ -f "$AGENT_JSON" ]; then
            HEALTH=$(jq -r '.summary.health_score // 50' "$AGENT_JSON")
            echo "health=$HEALTH" >> $GITHUB_OUTPUT
          fi

      - name: Check Circular Imports
        run: |
          echo "### Circular Imports" >> $GITHUB_STEP_SUMMARY
          loct cycles >> $GITHUB_STEP_SUMMARY 2>&1 || true

      - name: Check Dead Exports
        run: |
          echo "### Dead Code" >> $GITHUB_STEP_SUMMARY
          loct dead --top 10 >> $GITHUB_STEP_SUMMARY 2>&1 || true

      - name: Verify Health Threshold (advisory)
        if: steps.scan.outputs.health != ''
        run: |
          HEALTH=${{ steps.scan.outputs.health }}
          if [ "$HEALTH" -lt "$HEALTH_THRESHOLD" ]; then
            echo "::warning::Health score ($HEALTH) is below the advisory threshold ($HEALTH_THRESHOLD)"
          else
            echo "Health score ($HEALTH) meets the advisory threshold ($HEALTH_THRESHOLD)"
          fi

      # No artifact upload by design: the health/cycles/dead summaries above
      # are the public signal; the raw .loctree/ snapshot (full file inventory
      # and structural metrics) stays out of publicly downloadable artifacts.
