name: Publish to TestPyPI

# Manual dry-run publish to TestPyPI via PyPI Trusted Publishing (OIDC).
# NO API tokens, NO username/password: the publish job mints a short-lived
# OIDC identity token (id-token: write) that TestPyPI verifies against a
# pre-registered trusted publisher. Third-party actions are pinned to full
# commit SHAs (supply-chain hardening); the trailing comment records the
# human-readable version.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag/branch/SHA) to build and publish"
        required: true
        type: string
      version:
        description: "Expected package version (must equal pyproject version at ref)"
        required: true
        type: string

# Workflow-level default: read-only. Each job narrows further below.
permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # persist-credentials: false — this job only builds a package and never
      # runs git push/commit, so persisting GITHUB_TOKEN into the local git
      # config would be an unnecessary credential-surface expansion.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

      # Guard: the version on the checked-out ref must equal the operator input.
      - name: Verify version matches input
        shell: bash
        run: |
          expected="${{ inputs.version }}"
          actual="$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/^version = "([^"]+)"/\1/')"
          echo "pyproject version: ${actual}  |  expected: ${expected}"
          if [ "${actual}" != "${expected}" ]; then
            echo "::error::version mismatch: pyproject=${actual} expected=${expected}"
            exit 1
          fi

      # --no-sources disables tool.uv.sources so the build matches a standard
      # (non-uv) toolchain — a health gate before publishing.
      - name: Build sdist + wheel
        run: uv build --no-sources

      - name: Check distribution metadata
        run: uvx twine check --strict dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to TestPyPI
    needs: [build]
    runs-on: ubuntu-latest
    # Environment protection (required reviewers + deployment branch/tag rules)
    # is the real gate that stops an unapproved publish — configured repo-side.
    environment:
      name: testpypi
      url: https://test.pypi.org/p/screenscribe
    # ONLY id-token: write — mandatory for Trusted Publishing, job-level to
    # minimise credential exposure. No contents: read needed: download-artifact
    # pulls same-run artifacts via the Actions runtime token, not GITHUB_TOKEN.
    # No checkout / no untrusted code runs in this job.
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      # Attestations are ON by default under Trusted Publishing (signed digital
      # attestations generated + uploaded with the distributions); left at
      # default intentionally.
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
